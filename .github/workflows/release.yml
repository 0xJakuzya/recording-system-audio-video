name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller build.spec --clean --noconfirm

      - name: Rename exe
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Copy-Item -Path "dist/recorder.exe" -Destination "dist/recorder-$version.exe"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer.iss

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/recorder-*.exe
            installer_out/recorder-setup-*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
