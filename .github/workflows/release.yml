name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller build.spec --clean --noconfirm

      - name: Rename exe
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Copy-Item -Path "dist/recorder.exe" -Destination "dist/recorder-$version.exe"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer.iss

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/recorder-${{ github.ref_name }}.exe
            installer_out/recorder-setup-*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## Recorder ${{ github.ref_name }}

            Приложение для синхронной записи видео, аудио и временных меток.

            ### Установка

            - **`recorder-setup-*.exe`** — установщик: создаст ярлык на рабочем столе и в меню «Пуск»
            - **`recorder-*.exe`** — переносимый exe: запускается без установки

            ### Как пользоваться

            1. Запустите приложение — заполните дату рождения и пол
            2. Нажмите **«НАЧАТЬ ЗАПИСЬ»** — начнётся синхронная запись с камеры и микрофона
            3. **Пробел** — поставить метку (первое нажатие открывает сегмент, второе закрывает)
            4. **F11** — полноэкранный режим, **Esc** — выйти
            5. По завершении записи файлы сохранятся в папку `data/` рядом с приложением:
               - `audio_*.wav` — аудиодорожка
               - `video_*.avi` — видеопоток
               - `markers_*.json` — метки с таймкодами
               - `user_info.json` — данные участника

            ### Примечание

            При первом запуске Windows SmartScreen / Defender может показать предупреждение «неизвестный издатель» — это ожидаемо для неподписанных сборок. Нажмите **«Подробнее» → «Выполнить в любом случае»**.
          draft: false
          prerelease: false
